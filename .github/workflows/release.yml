name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: |
          mkdir dist

          GOOS=${{ matrix.goos }} \
          GOARCH=${{ matrix.goarch }} \
          go build \
            -o dist/pdfgen-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/pdfgen

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
